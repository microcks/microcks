name: sonar-cloud-analysis
on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 4 * * *'  # Everyday at 4am UTC
  pull_request:
    types: [opened, synchronize, reopened]
permissions: read-all
jobs:
  build:
    if: github.repository_owner == 'microcks' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up JDK 25 for x64
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Test with coverage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Pcoverage -Dsonar.projectKey=microcks_microcks

