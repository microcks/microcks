name: release
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release'
        required: true
      version:
        description: 'Release version'
        required: true
      nextVersion:
        description: 'Next version after release (-SNAPSHOT will be added automatically)'
        required: true
      deployMavenActive:
        description: 'Deploy Maven Active value for JReleaser (use NEVER if already pushed)'
        required: false
        default: 'ALWAYS'
        type: string
      deployHelmActive:
        description: 'Deploy Helm Active value for chart publication (use NEVER if already pushed)'
        required: false
        default: 'ALWAYS'
        type: string
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      deployments: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch }}

      - name: Set up JDK 21 for x64
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64
          cache: maven

      - name: Set release version
        run: mvn -B -q versions:set -DnewVersion=${{ github.event.inputs.version }}

      - name: Commit, push and tag changes
        run: |
          git config user.name "microcks-bot"
          git config user.email "info@microcks.io"
          git commit --no-verify -m "Releasing version ${{ github.event.inputs.version }}" .
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - name: Stage release artifacts
        run: mvn -B -Prelease clean deploy -DaltDeploymentRepository=local::default::file://`pwd`/target/staging-deploy

      - name: Publish package with JReleaser
        env:
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_DEPLOY_MAVEN_ACTIVE: ${{ github.event.inputs.deployMavenActive }}
        run: mvn -N -Prelease jreleaser:assemble jreleaser:full-release

      # Persist logs
      - name: JReleaser release output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-release
          path: |
            target/jreleaser/trace.log
            target/jreleaser/output.properties

      - name: Set next iteration version
        run: mvn -B -q versions:set -DnewVersion=${{ github.event.inputs.nextVersion }}-SNAPSHOT

      - name: Commit, push and tag changes
        run: |
          git commit --no-verify -m "Setting SNAPSHOT version ${{ github.event.inputs.nextVersion }}-SNAPSHOT" .
          git push origin ${{ github.event.inputs.branch }}

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Login to Quay OCI registry
        run: |
          echo ${{ secrets.QUAY_HELM_PASSWORD }} | helm registry login quay.io -u ${{ secrets.QUAY_HELM_USERNAME }} --password-stdin
          echo ${{ secrets.QUAY_HELM_PASSWORD }} | cosign login quay.io -u ${{ secrets.QUAY_HELM_USERNAME }} --password-stdin

      - name: Package microcks chart
        run: |
          cd ${{github.workspace}}/install/kubernetes
          helm package ./microcks --version ${{ github.event.inputs.version }} --destination ./packaged

      - name: Push microcks chart
        id: push_chart
        run: |
          cd ${{github.workspace}}/install/kubernetes
          OUTPUT=$(helm push ./packaged/microcks-${{ github.event.inputs.version }}.tgz oci://quay.io/microcks/microcks-charts 2>&1)
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -oP 'Digest: \K\S+')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign microcks chart
        run: |
          cosign sign --new-bundle-format=false --use-signing-config=false --yes \
            quay.io/microcks/microcks-charts/microcks@${{ steps.push_chart.outputs.digest }}